# Render deployment config
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: onestyle-backend
    env: node
    plan: free
    rootDir: backend          # all build/start commands run from the backend/ folder
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: onestyle-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://sedigaplanit.github.io

databases:
  - name: onestyle-db
    databaseName: onestyle_db
    plan: free
